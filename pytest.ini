[pytest]
testpaths = tests
addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes
    -x

markers =
    unit: Unit tests
    integration: Integration tests
    slow: Tests that take more than 5s

log_cli = true
log_cli_level = INFO

[coverage:run]
source = etl, analytics, forecasting, decision_support, api
omit =
    */tests/*
    */__init__.py

[coverage:report]
show_missing = true
skip_covered = false
fail_under = 70
